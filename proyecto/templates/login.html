<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Supermercado</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url("{{ url_for('static', filename='images/background-pattern.jpg') }}");
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .registro-container {
      background-color: #b1e536;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      width: 400px;
      text-align: center;
      margin-top: 100px;
    }
    .registro-container img {
      width: 150px;
      height: auto;
      margin-bottom: 20px;
    }
    h2 { margin-bottom: 20px; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }
    button[type="submit"] {
      width: 100%;
      background-color: #43a047;
      color: white;
      padding: 12px;
      margin-top: 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button[type="submit"]:hover {
      background-color: #388e3c;
    }
    .login-link { text-align: center; margin-top: 15px; }
  </style>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-N084FH1T0S"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-N084FH1T0S');
</script>
</head>
<body>
  <div class="registro-container">
    <a href="{{ url_for('cliente_dashboard') }}"><img src="{{ url_for('static', filename='images/plato.jpg') }}"></a>
    <h2>Iniciar Sesion</h2>

    <form method="POST">
      <label>Nombre de usuario:</label>
      <input type="text" name="username" required>

      <label>Contraseña:</label>
      <input type="password" name="password" required>

      <button type="submit">ingresar</button>
    </form>

    <div class="login-link">
      <p>¿Ya tienes cuenta? <a href="{{ url_for('register') }}">Registar</a></p>
    </div>
  </div>
</body>
</html>
